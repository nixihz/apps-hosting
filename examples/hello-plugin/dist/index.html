<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello 插件示例</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#271a3f,#0d5260);color:#fff}
    main{max-width:880px;margin:0 auto;padding:64px 24px}.badge{display:inline-flex;gap:8px;align-items:center;border:1px solid #ffffff40;border-radius:999px;padding:8px 14px;background:#ffffff18}
    h1{font-size:46px;margin:22px 0 12px}.card{margin-top:28px;background:#ffffff14;border:1px solid #ffffff2f;border-radius:22px;padding:24px;box-shadow:0 24px 80px #0005}
    code{background:#0005;border-radius:8px;padding:3px 7px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.item{border:1px solid #ffffff26;border-radius:16px;padding:16px;background:#0002}
  </style>
</head>
<body>
  <main>
    <span class="badge">🧩 Keli Apps 页面插件</span>
    <h1>Hello 插件示例</h1>
    <p>这是一个最小页面型插件。构建产物位于 <code>dist/</code>，通过 <code>apps.yaml</code> 声明后即可安装到平台。</p>
    <section class="card">
      <h2>插件可以做什么？</h2>
      <div class="grid">
        <div class="item"><strong>页面扩展</strong><br>挂到统一入口或菜单中。</div>
        <div class="item"><strong>工具集成</strong><br>封装内部查询、AI 工具或运维入口。</div>
        <div class="item"><strong>权限治理</strong><br>通过 manifest 声明访问权限。</div>
      </div>
    </section>
  </main>
</body>
</html>
