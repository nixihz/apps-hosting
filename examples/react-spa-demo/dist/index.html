@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Serif+SC:wght@500;700&display=swap');
:root{color-scheme:dark;--ink:#fff4dc;--muted:#cabd9e;--line:#ffffff24;--hot:#ffb000;--mint:#55f2d7;--pink:#ff4fd8;--bg:#130e09}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#080705;color:var(--ink);font-family:'Noto Serif SC',serif;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 12%,#ffb00026 0 16%,transparent 31%),radial-gradient(circle at 86% 18%,#55f2d72e 0 13%,transparent 30%),linear-gradient(135deg,#130d08,#261207 56%,#071917);pointer-events:none}body:after{content:"";position:fixed;inset:0;background-image:linear-gradient(#fff1 1px,transparent 1px),linear-gradient(90deg,#fff1 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(to bottom,#000,transparent 82%);pointer-events:none}.stage{--mx:0;--my:0;--gx:50%;--gy:50%;position:relative;max-width:1180px;margin:0 auto;padding:56px 28px;display:grid;grid-template-columns:360px 1fr;gap:28px;min-height:100vh;align-items:center}.stage:before{content:"";position:absolute;inset:24px;border-radius:42px;background:radial-gradient(circle at var(--gx) var(--gy),#fff8 0 0.5%,#ffb0002a 0 14%,transparent 34%);filter:blur(8px);opacity:.75;pointer-events:none;transition:opacity .2s}.kinetic{position:absolute;inset:0;overflow:hidden;pointer-events:none}.orbit{position:absolute;border:1px solid #fff3;border-radius:42% 58% 53% 47%;filter:drop-shadow(0 0 28px #55f2d777);transform:translate(calc(var(--mx)*-22px),calc(var(--my)*-22px)) rotate(0deg);animation:spin 16s linear infinite}.orbit:before,.orbit:after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:var(--mint);box-shadow:0 0 30px var(--mint)}.orbit:before{left:12%;top:16%}.orbit:after{right:18%;bottom:10%;background:var(--hot);box-shadow:0 0 30px var(--hot)}.orbit-a{width:520px;height:330px;right:4%;top:13%}.orbit-b{width:310px;height:210px;left:0;bottom:13%;animation-direction:reverse;animation-duration:11s;border-color:#ffb00055}.beam{position:absolute;width:55vw;height:2px;right:-8vw;top:28%;background:linear-gradient(90deg,transparent,var(--pink),var(--hot),transparent);box-shadow:0 0 35px var(--pink);transform:rotate(-18deg);animation:sweep 5s cubic-bezier(.7,0,.2,1) infinite}.cell-field{position:absolute;right:24px;bottom:38px;width:460px;display:grid;grid-template-columns:repeat(7,1fr);gap:10px;transform:perspective(680px) rotateX(58deg) rotateZ(-18deg) translate(calc(var(--mx)*20px),calc(var(--my)*20px));opacity:.8}.cell-field span{height:34px;border:1px solid #ffffff28;border-radius:10px;background:linear-gradient(135deg,#ffffff18,#0002);animation:pop 3.8s cubic-bezier(.2,.8,.2,1) infinite;animation-delay:calc(var(--i)*-90ms)}.sparks b{position:absolute;left:var(--x);top:var(--y);width:8px;height:8px;border-radius:2px;background:var(--hot);transform:rotate(45deg);animation:float 4.5s ease-in-out infinite;animation-delay:calc(var(--i)*-140ms);box-shadow:0 0 20px currentColor}.sparks b:nth-child(3n){color:var(--mint);background:var(--mint)}.sparks b:nth-child(4n){color:var(--pink);background:var(--pink)}aside,.panel{position:relative;z-index:1;border:1px solid var(--line);background:linear-gradient(180deg,#ffffff18,#ffffff08);backdrop-filter:blur(22px);box-shadow:0 30px 100px #0009;border-radius:32px;transform:translate(calc(var(--mx)*-8px),calc(var(--my)*-8px))}aside{padding:34px;overflow:hidden;animation:enter-left .8s cubic-bezier(.2,.9,.1,1) both}aside:after{content:"";position:absolute;inset:auto -25% -30% 15%;height:180px;background:radial-gradient(circle,#ffb00040,transparent 68%);filter:blur(20px)}.mark{width:76px;height:76px;border-radius:24px;background:var(--hot);color:#231400;display:grid;place-items:center;font-size:42px;font-weight:900;box-shadow:0 18px 48px #ffb00055;animation:wobble 3.4s ease-in-out infinite}.eyebrow,.tag{letter-spacing:.18em;text-transform:uppercase;color:var(--hot);font-size:12px}.aside-copy{font-size:15px;line-height:1.7}h1{font-family:'DM Serif Display','Noto Seri <body>
  <div id="root"></div>
  <script type="module">
import React, {useMemo, useState, useEffect, useRef} from 'https://esm.sh/react@18';

function usePointerGlow(ref){ useEffect(()=>{ const element=ref.current; if(!element) return undefined; let frame=0; const update=(event)=>{ cancelAnimationFrame(frame); frame=requestAnimationFrame(()=>{ const rect=element.getBoundingClientRect(); const x=((event.clientX-rect.left)/rect.width-.5).toFixed(3); const y=((event.clientY-rect.top)/rect.height-.5).toFixed(3); element.style.setProperty('--mx', x); element.style.setProperty('--my', y); element.style.setProperty('--gx', `${event.clientX-rect.left}px`); element.style.setProperty('--gy', `${event.clientY-rect.top}px`); }); }; element.addEventListener('pointermove', update, {passive:true}); return()=>{ cancelAnimationFrame(frame); element.removeEventListener('pointermove', update); }; },[ref]); }
function KineticBackdrop(){ return h('div',{className:'kinetic','aria-hidden':'true'},h('div',{className:'orbit orbit-a'}),h('div',{className:'orbit orbit-b'}),h('div',{className:'beam'}),h('div',{className:'cell-field'},...cells.map(cell=>h('span',{key:cell,style:{'--i':cell}}))),h('div',{className:'sparks'},...sparks.map(spark=>h('b',{key:spark,style:{'--i':spark,'--x':`${(spark*53)%100}%`,'--y':`${8+((spark*37)%82)}%`}})))); }
function App(){ const path=useRoute(); const stageRef=useRef(null); usePointerGlow(stageRef); const page=useMemo(()=>path.startsWith('/metrics')?h(Metrics):path.startsWith('/settings')?h(Settings):h(Home),[path]); return h('main',{ref:stageRef,className:'stage'},h(KineticBackdrop),h('aside',null,h('div',{className:'mark'},'K'),h('p',{className:'eyebrow'},'KELI APPS SPA'),h('h1',null,h('span',null,'React'),' 小应用驾驶舱'),h('p',{className:'aside-copy'},'几何块、路径线和弹性入场组成一套轻量动效，不引入额外动画依赖。'),h('nav',null,h('button',{className:path==='/'?'active':'',onClick:()=>navigate('/')},'概览 ',h('i')),h('button',{className:path.startsWith('/metrics')?'active':'',onClick:()=>navigate('/metrics')},'指标 ',h('i')),h('button',{className:path.startsWith('/settings')?'active':'',onClick:()=>navigate('/settings/profile')},'深层路由 ',h('i')))),h('section',{className:'panel','data-reveal':true,key:path},page)); }

function Metrics(){ return h(React.Fragment,null,h('span',{className:'tag'},'runtime metrics'),h('h2',null,'指标页'),h('div',{className:'meter'},h('i',{style:{width:'72%'}})),h('p',null,'进度条加入了流动高光和弹性入场，用来确认 SPA 内部导航不会触发整页刷新。')); }
function Settings(){ return h(React.Fragment,null,h('span',{className:'tag'},'deep route'),h('h2',null,'深层路由可刷新'),h('p',null,'尝试直接打开 ',h('code',null,'/x/react-spa-demo/settings/profile'),'，Keli Apps 会把请求 fallback 到应用的 ',h('code',null,'dist/index.html'),'。')); }
