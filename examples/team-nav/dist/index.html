<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>团队导航页</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#101827;color:#edf2ff}
    main{max-width:920px;margin:0 auto;padding:48px 24px}
    h1{font-size:44px;margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:28px}
    a{display:block;padding:20px;border:1px solid #31405f;border-radius:18px;background:#17233a;color:#fff;text-decoration:none}a:hover{border-color:#7cc4ff;transform:translateY(-2px)}
    small{color:#9fb0d0}
  </style>
</head>
<body>
  <main>
    <h1>团队导航页</h1>
    <p>这是一个可被 Keli Apps 托管的纯前端 Demo 应用。</p>
    <section class="grid">
      <a href="#"><strong>GitLab</strong><br><small>代码仓库</small></a>
      <a href="#"><strong>Jenkins</strong><br><small>构建流水线</small></a>
      <a href="#"><strong>Sentry</strong><br><small>错误监控</small></a>
      <a href="#"><strong>飞书文档</strong><br><small>团队知识库</small></a>
    </section>
  </main>
</body>
</html>
